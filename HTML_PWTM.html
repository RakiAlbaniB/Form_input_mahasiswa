<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Data Mahasiswa</title>
<link rel="stylesheet" href="CSS_PWTM.css">
<style>
header {
    background-color: #303030;
    color: #fff;
    text-align: center;
    padding: 20px 0;
    position: fixed;
    right: 0;
    top: 0;
    width: 100%;
}

footer {
    background-color: #303030;
    color: #fff;
    text-align: center;
    padding: 10px 0;
    position: fixed;
    left: 0;
    bottom: 0;
    width: 100%;
}

</style>
<script>
function validateForm() {
    var nama = document.getElementById("nama").value;
    var nim = document.getElementById("nim").value;
    var tgl_lahir = document.getElementById("tgl_lahir").value;

    // Validasi Nama
    if (!/^[A-Za-z\s]+$/.test(nama)) {
        alert("hufft yang bener dong kalo nulis nama (^0~0^) ");
        return false;
    }

    // Validasi NIM
    if (!/^\d{10}$/.test(nim)) {
        alert("maaf nim kamu kurang dari 10 angka (^0~0^) ");
        return false;
    }

    return true;
}

function resetForm() {
    document.getElementById("nama").value = "";
    document.getElementById("nim").value = "";
    document.getElementById("tgl_lahir").value = "";
}
</script>
</head>
<body>
    <header>
    </header>
     <div class="container">
        <h2>Input Data Mahasiswa</h2>
            <form action="PHP_PWTM.php" method="POST" onsubmit="return validateForm()">
                <label for="nama">Nama:</label>
                <input type="text" id="nama" name="nama" required><br><br>

                <label for="nim">NIM:</label>
                <input type="text" id="nim" name="nim" required><br><br>

                <label for="tgl_lahir">Tanggal Lahir:</label>
                <input type="date" id="tgl_lahir" name="tgl_lahir" required><br><br>

                <button type="submit" name="submit">Submit</button>
                <button type="button" onclick="resetForm()">Reset</button>
            </form>
        </div>
        <footer>
            (^0~0^)
        </footer>
</body>
</html>
